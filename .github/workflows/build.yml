            exit 1
          fi
          if grep -q "co_skull has no column named skin" "$LOG"; then
            echo "::error::DB migration failed — co_skull missing skin column"
            exit 1
          fi
          if ! grep -q "CoreProtect has been successfully enabled" "$LOG"; then
            cat "$LOG"
            echo "::error::CoreProtect did not report successful enable"
            exit 1
          fi
          if ! grep -q "Done (" "$LOG"; then
            cat "$LOG"
            echo "::error::Server did not reach ready state"
            exit 1
          fi
          echo "Folia smoke test passed"

      - name: Upload server log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: folia-smoke-log-stable
          path: smoke-server/server.log
          retention-days: 7

  publish-dev:
    name: Publish Dev Release
    runs-on: ubuntu-latest
    needs: [check, build-dev, smoke-test-dev, folia-smoke-test-dev]
    permissions:
      contents: write
      actions: read
      attestations: write
      id-token: write
      packages: write
    steps:
      - name: Download plugin artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: plugin-jar-dev
          path: plugin-jar/

      - name: Set up JDK
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Publish to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.build-dev.outputs.version }}
          SHORT_SHA: ${{ needs.check.outputs.dev_short_sha }}
        run: |
          cat > /tmp/settings.xml <<'XML'
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>${env.GITHUB_ACTOR}</username>
                <password>${env.GITHUB_TOKEN}</password>
              </server>
            </servers>
          </settings>
          XML
          JAR=$(ls plugin-jar/CoreProtect-*.jar)
          DEPLOY_VERSION="${VERSION}-dev-${SHORT_SHA}"
          mvn deploy:deploy-file \
            -Dfile="$JAR" \
            -DgroupId=io.github.dubsector \
            -DartifactId=coreprotect \
            -Dversion="$DEPLOY_VERSION" \
            -Dpackaging=jar \
            -DrepositoryId=github \
            -Durl=https://maven.pkg.github.com/${{ github.repository }} \
            -s /tmp/settings.xml \
            -q

      - name: Attest build provenance
        id: attest
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: plugin-jar/CoreProtect-*.jar

      - name: Copy provenance bundle for release
        env:
          BUNDLE_PATH: ${{ steps.attest.outputs.bundle-path }}
        run: |
          JAR=$(ls plugin-jar/CoreProtect-*.jar | head -1)
          cp "$BUNDLE_PATH" "${JAR}.intoto.jsonl"

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign JAR
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          JAR=$(ls plugin-jar/CoreProtect-*.jar)
          cosign sign-blob --yes --bundle "${JAR}.sigstore.json" "$JAR"

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.build-dev.outputs.version }}
          SHORT_SHA: ${{ needs.check.outputs.dev_short_sha }}
          DEV_SHA: ${{ needs.check.outputs.dev_sha }}
          MC_MIN: ${{ needs.build-dev.outputs.mc_min }}
          MC_MAX: ${{ needs.build-dev.outputs.mc_max }}
        run: |
          JAR=$(ls plugin-jar/CoreProtect-*.jar | head -1)
          JAR_NAME=$(basename "$JAR")
          gh release create "dev-${SHORT_SHA}" \
            --repo "${{ github.repository }}" \
            --title "CoreProtect ${VERSION} Dev (${SHORT_SHA})" \
            --prerelease \
            --notes "> ⚠️ Development build — use at your own risk

          Built from upstream master @ [${SHORT_SHA}](https://github.com/PlayPro/CoreProtect/commit/${DEV_SHA})

          | Platform | Compatible versions |
          |----------|---------------------|
          | Paper | \`${MC_MIN} – ${MC_MAX}\` |
          | Folia | \`${MC_MIN} – ${MC_MAX}\` |

          **Verify the JAR:**
          \`\`\`sh
          gh attestation verify ${JAR_NAME} --repo ${{ github.repository }}

          cosign verify-blob ${JAR_NAME} \\
            --bundle ${JAR_NAME}.sigstore.json
          \`\`\`" \
            plugin-jar/CoreProtect-*.jar \
            plugin-jar/CoreProtect-*.jar.sigstore.json \
            plugin-jar/CoreProtect-*.jar.intoto.jsonl

  publish-stable:
    name: Publish Stable Release
    runs-on: ubuntu-latest
    needs: [check, build-stable, smoke-test-stable, folia-smoke-test-stable]
    permissions:
