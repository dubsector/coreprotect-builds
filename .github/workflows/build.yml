name: CoreProtect Build

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

permissions: {}

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      build_dev: ${{ steps.check.outputs.build_dev }}
      build_stable: ${{ steps.check.outputs.build_stable }}
      dev_sha: ${{ steps.check.outputs.dev_sha }}
      dev_short_sha: ${{ steps.check.outputs.dev_short_sha }}
      stable_tag: ${{ steps.check.outputs.stable_tag }}
    steps:
      - name: Check upstream for changes
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DEV_SHA=$(git ls-remote https://github.com/PlayPro/CoreProtect.git HEAD | cut -f1)
          DEV_SHORT=${DEV_SHA:0:7}
          echo "dev_sha=$DEV_SHA" >> $GITHUB_OUTPUT
          echo "dev_short_sha=$DEV_SHORT" >> $GITHUB_OUTPUT

          if gh release view "dev-$DEV_SHORT" --repo ${{ github.repository }} > /dev/null 2>&1; then
            echo "build_dev=false" >> $GITHUB_OUTPUT
          else
            echo "build_dev=true" >> $GITHUB_OUTPUT
          fi

          STABLE_TAG=$(git ls-remote --tags https://github.com/PlayPro/CoreProtect.git | grep -oP 'refs/tags/v[\d.]+$' | sort -V | tail -1 | sed 's|refs/tags/||')
          echo "stable_tag=$STABLE_TAG" >> $GITHUB_OUTPUT

          if gh release view "stable-$STABLE_TAG" --repo ${{ github.repository }} > /dev/null 2>&1; then
            echo "build_stable=false" >> $GITHUB_OUTPUT
          else
            echo "build_stable=true" >> $GITHUB_OUTPUT
          fi

  build-dev:
    needs: check
    if: needs.check.outputs.build_dev == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    outputs:
      version: ${{ steps.ver.outputs.version }}
      mc_min: ${{ steps.ver.outputs.mc_min }}
      mc_max: ${{ steps.ver.outputs.mc_max }}
    steps:
      - name: Checkout CoreProtect
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: PlayPro/CoreProtect
          persist-credentials: false

      - name: Apply patches
        run: |
          sed -i 's|<project.branch></project.branch>|<project.branch>patched</project.branch>|' pom.xml
          sed -i 's/return !isBranch("edge") \&\& !isBranch("coreprotect") \&\& !validDonationKey();/return false;/' src/main/java/net/coreprotect/utility/VersionUtils.java

      - name: Set up JDK 25
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Build
        run: mvn clean install -q

      - name: Get version and MC range
        id: ver
        run: |
          echo "version=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_OUTPUT
          echo "mc_min=$(grep -oP '(?<=MINECRAFT_VERSION = ")[^"]+' src/main/java/net/coreprotect/config/ConfigHandler.java)" >> $GITHUB_OUTPUT
          echo "mc_max=$(grep -oP '(?<=LATEST_VERSION = ")[^"]+' src/main/java/net/coreprotect/config/ConfigHandler.java)" >> $GITHUB_OUTPUT

      - name: Rename JAR
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          SHORT_SHA: ${{ needs.check.outputs.dev_short_sha }}
        run: mv target/CoreProtect-${VERSION}.jar target/CoreProtect-${VERSION}-dev+${SHORT_SHA}.jar

      - name: Upload plugin artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: plugin-jar-dev
          path: target/CoreProtect-*.jar

  build-stable:
    needs: check
    if: needs.check.outputs.build_stable == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    outputs:
      version: ${{ steps.ver.outputs.version }}
      mc_min: ${{ steps.ver.outputs.mc_min }}
      mc_max: ${{ steps.ver.outputs.mc_max }}
    steps:
      - name: Checkout CoreProtect
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: PlayPro/CoreProtect
          ref: ${{ needs.check.outputs.stable_tag }}
          persist-credentials: false

      - name: Apply patches
        run: |
          sed -i 's|<project.branch></project.branch>|<project.branch>patched</project.branch>|' pom.xml
          sed -i 's/return !isBranch("edge") \&\& !isBranch("coreprotect") \&\& !validDonationKey();/return false;/' src/main/java/net/coreprotect/utility/VersionUtils.java

      - name: Set up JDK 25
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Build
        run: mvn clean install -q

      - name: Get version and MC range
        id: ver
        run: |
          echo "version=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_OUTPUT
          echo "mc_min=$(grep -oP '(?<=MINECRAFT_VERSION = ")[^"]+' src/main/java/net/coreprotect/config/ConfigHandler.java)" >> $GITHUB_OUTPUT
          echo "mc_max=$(grep -oP '(?<=LATEST_VERSION = ")[^"]+' src/main/java/net/coreprotect/config/ConfigHandler.java)" >> $GITHUB_OUTPUT

      - name: Rename JAR
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: mv target/CoreProtect-${VERSION}.jar target/CoreProtect-${VERSION}-stable.jar

      - name: Upload plugin artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: plugin-jar-stable
          path: target/CoreProtect-*.jar

  smoke-test-dev:
    name: Paper Smoke Test (Dev)
    runs-on: ubuntu-latest
    needs: [check, build-dev]
    permissions:
      actions: write
    steps:
      - name: Download built JAR
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: plugin-jar-dev
          path: plugin-jar/

      - name: Resolve latest Paper build
        id: paper
        run: |
          curl -fsSL "https://fill.papermc.io/v3/projects/paper" -o /tmp/paper-versions-dev.json
          MC_VERSION=$(python3 -c "import json; vs=json.load(open('/tmp/paper-versions-dev.json'))['versions']; k=next(iter(vs)); print(vs[k][0])")
          curl -fsSL "https://fill.papermc.io/v3/projects/paper/versions/${MC_VERSION}/builds" -o /tmp/paper-builds-dev.json
          BUILD=$(python3 -c "import json; builds=json.load(open('/tmp/paper-builds-dev.json')); stable=[b for b in builds if b.get('channel','')=='STABLE']; chosen=(stable or builds)[0]; print(chosen['id'])")
          JAR_NAME=$(python3 -c "import json; builds=json.load(open('/tmp/paper-builds-dev.json')); stable=[b for b in builds if b.get('channel','')=='STABLE']; chosen=(stable or builds)[0]; print(chosen['downloads']['server:default']['name'])")
          JAR_URL=$(python3 -c "import json; builds=json.load(open('/tmp/paper-builds-dev.json')); stable=[b for b in builds if b.get('channel','')=='STABLE']; chosen=(stable or builds)[0]; print(chosen['downloads']['server:default']['url'])")
          echo "mc_version=${MC_VERSION}" >> "$GITHUB_OUTPUT"
          echo "build=${BUILD}" >> "$GITHUB_OUTPUT"
          echo "jar_name=${JAR_NAME}" >> "$GITHUB_OUTPUT"
          echo "jar_url=${JAR_URL}" >> "$GITHUB_OUTPUT"

      - name: Download Paper server JAR
        env:
          JAR_URL: ${{ steps.paper.outputs.jar_url }}
        run: |
          mkdir -p smoke-server/plugins
          curl -fsSL "$JAR_URL" -o smoke-server/paper.jar

      - name: Detect required Java version
        id: java_ver
        env:
          MC_VERSION: ${{ steps.paper.outputs.mc_version }}
        run: |
          REQUIRED=$(curl -fsSL "https://fill.papermc.io/v3/projects/paper/versions/${MC_VERSION}" | python3 -c "import sys,json; print(json.load(sys.stdin)['version']['java']['version']['minimum'])")
          echo "version=${REQUIRED}" >> "$GITHUB_OUTPUT"

      - name: Set up required JDK
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          java-version: ${{ steps.java_ver.outputs.version }}
          distribution: 'temurin'

      - name: Copy plugin JAR
        run: cp plugin-jar/CoreProtect-*.jar smoke-server/plugins/CoreProtect.jar

      - name: Configure server
        run: |
          echo "eula=true" > smoke-server/eula.txt
          printf '%s\n' "online-mode=false" "level-type=flat" "generate-structures=false" "max-players=0" > smoke-server/server.properties

      - name: Run server and wait for ready
        run: |
          cd smoke-server
          java -Xms512m -Xmx1g -jar paper.jar --nogui > server.log 2>&1 &
          SERVER_PID=$!
          ELAPSED=0
          while [ $ELAPSED -lt 120 ]; do
            sleep 2; ELAPSED=$((ELAPSED + 2))
            if grep -q "Done (" server.log 2>/dev/null; then
              echo "Server ready after ${ELAPSED}s"; break
            fi
            if ! kill -0 $SERVER_PID 2>/dev/null; then
              echo "Server process exited after ${ELAPSED}s"; break
            fi
          done
          kill $SERVER_PID 2>/dev/null || true
          wait $SERVER_PID 2>/dev/null || true

      - name: Assert CoreProtect loaded cleanly
        run: |
          LOG=smoke-server/server.log
          if grep -qiE "SEVERE.*CoreProtect|Could not load.*CoreProtect|Error.*CoreProtect" "$LOG"; then
            echo "::error::CoreProtect logged errors on startup:"
            grep -iE "SEVERE.*CoreProtect|Could not load.*CoreProtect|Error.*CoreProtect" "$LOG"
            exit 1
          fi
          if grep -q "co_skull has no column named skin" "$LOG"; then
            echo "::error::DB migration failed — co_skull missing skin column"
            exit 1
          fi
          if ! grep -q "CoreProtect has been successfully enabled" "$LOG"; then
            cat "$LOG"
            echo "::error::CoreProtect did not report successful enable"
            exit 1
          fi
          if ! grep -q "Done (" "$LOG"; then
            cat "$LOG"
            echo "::error::Server did not reach ready state"
            exit 1
          fi
          echo "Smoke test passed"

      - name: Upload server log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: smoke-log-dev
          path: smoke-server/server.log
          retention-days: 7

