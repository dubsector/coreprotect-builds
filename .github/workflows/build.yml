name: CoreProtect Build

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      build_dev: ${{ steps.check.outputs.build_dev }}
      build_stable: ${{ steps.check.outputs.build_stable }}
      dev_sha: ${{ steps.check.outputs.dev_sha }}
      dev_short_sha: ${{ steps.check.outputs.dev_short_sha }}
      stable_tag: ${{ steps.check.outputs.stable_tag }}
    steps:
      - name: Check upstream for changes
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DEV_SHA=$(git ls-remote https://github.com/PlayPro/CoreProtect.git HEAD | cut -f1)
          DEV_SHORT=${DEV_SHA:0:7}
          echo "dev_sha=$DEV_SHA" >> $GITHUB_OUTPUT
          echo "dev_short_sha=$DEV_SHORT" >> $GITHUB_OUTPUT

          if gh release view "dev-$DEV_SHORT" --repo ${{ github.repository }} > /dev/null 2>&1; then
            echo "build_dev=false" >> $GITHUB_OUTPUT
          else
            echo "build_dev=true" >> $GITHUB_OUTPUT
          fi

          STABLE_TAG=$(git ls-remote --tags https://github.com/PlayPro/CoreProtect.git | grep -oP 'refs/tags/v[\d.]+$' | sort -V | tail -1 | sed 's|refs/tags/||')
          echo "stable_tag=$STABLE_TAG" >> $GITHUB_OUTPUT

          if gh release view "stable-$STABLE_TAG" --repo ${{ github.repository }} > /dev/null 2>&1; then
            echo "build_stable=false" >> $GITHUB_OUTPUT
          else
            echo "build_stable=true" >> $GITHUB_OUTPUT
          fi

  dev:
    needs: check
    if: needs.check.outputs.build_dev == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout CoreProtect
        uses: actions/checkout@v4
        with:
          repository: PlayPro/CoreProtect

      - name: Apply patches
        run: |
          sed -i 's|<project.branch></project.branch>|<project.branch>developer</project.branch>|' pom.xml
          sed -i 's/return !isBranch("edge") \&\& !isBranch("coreprotect") \&\& !validDonationKey();/return false;/' src/main/java/net/coreprotect/utility/VersionUtils.java

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build
        run: mvn clean install -q

      - name: Get version
        id: ver
        run: echo "version=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_OUTPUT

      - name: Rename JAR
        run: mv target/CoreProtect-${{ steps.ver.outputs.version }}.jar target/CoreProtect-${{ steps.ver.outputs.version }}-dev+${{ needs.check.outputs.dev_short_sha }}.jar

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-${{ needs.check.outputs.dev_short_sha }}
          name: CoreProtect ${{ steps.ver.outputs.version }} Dev (${{ needs.check.outputs.dev_short_sha }})
          prerelease: true
          body: |
            > ⚠️ Development build — use at your own risk

            Built from upstream master @ `${{ needs.check.outputs.dev_sha }}`
          files: target/CoreProtect-*.jar

  stable:
    needs: check
    if: needs.check.outputs.build_stable == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout CoreProtect
        uses: actions/checkout@v4
        with:
          repository: PlayPro/CoreProtect
          ref: ${{ needs.check.outputs.stable_tag }}

      - name: Apply patches
        run: |
          sed -i 's|<project.branch></project.branch>|<project.branch>developer</project.branch>|' pom.xml
          sed -i 's/return !isBranch("edge") \&\& !isBranch("coreprotect") \&\& !validDonationKey();/return false;/' src/main/java/net/coreprotect/utility/VersionUtils.java

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build
        run: mvn clean install -q

      - name: Get version
        id: ver
        run: echo "version=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_OUTPUT

      - name: Rename JAR
        run: mv target/CoreProtect-${{ steps.ver.outputs.version }}.jar target/CoreProtect-${{ steps.ver.outputs.version }}-stable.jar

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: stable-${{ needs.check.outputs.stable_tag }}
          name: CoreProtect ${{ steps.ver.outputs.version }} Stable (${{ needs.check.outputs.stable_tag }})
          prerelease: false
          body: |
            Built from upstream tag `${{ needs.check.outputs.stable_tag }}`
          files: target/CoreProtect-*.jar
